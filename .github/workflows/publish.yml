name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      repository:
        description: "Where to publish the built distributions"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - both

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.repository == 'testpypi' || inputs.repository == 'both')
    permissions:
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/p/thin-supervisor
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.repository == 'pypi' || inputs.repository == 'both'))
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/thin-supervisor
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
